	<meta name="asb-result-endpoint" content="" />
	<script>
		window.ABS_RESULT_ENDPOINT = `{{ abs_result_endpoint }}`;
		window.ABS_SESSION_ORDER_NUMBER = `{{ abs_session_order_number }}`;
		window.ASB_FRAMEWORK_NAMES = JSON.parse(`{{ asb_framework_names | tojson | safe }}`);
	</script>
	<script>
		// ABS completion marker: lets the bot-runner / automation reliably detect
		// when the in-browser detection payload POST to the result endpoint has
		// settled. Non-invasive: wraps fetch without altering its return value or
		// behavior, and only reacts to the `/_payload` submission.
		(function () {
			try {
				var origFetch = window.fetch;
				if (typeof origFetch !== "function") return;
				var isPayloadUrl = function (input) {
					try {
						var url = typeof input === "string" ? input : (input && input.url) || "";
						return url.indexOf("/_payload") !== -1;
					} catch (e) { return false; }
				};
				var mark = function (status) {
					try {
						if (document.body) {
							document.body.dataset.absPayloadStatus = String(status);
							document.body.dataset.absComplete = "true";
						}
					} catch (e) { /* no-op: marker must never break the page */ }
				};
				window.fetch = function (input) {
					var promise = origFetch.apply(this, arguments);
					if (isPayloadUrl(input)) {
						promise.then(
							function (resp) { mark(resp && resp.status); },
							function () { mark("error"); }
						);
					}
					return promise;
				};
			} catch (e) {
				console.warn("Failed to install ABS completion marker", e);
			}
		})();
	</script>
